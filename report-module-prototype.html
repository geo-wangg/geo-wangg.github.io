<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>售前提案报告模块 - 交互原型</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'PingFang SC', sans-serif;
            background: #f0f2f5; padding: 40px 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .page-header { margin-bottom: 24px; }
        .page-title { font-size: 20px; font-weight: 600; color: #262626; margin-bottom: 8px; }
        .page-subtitle { font-size: 14px; color: #8c8c8c; }
        .report-card { background: white; border-radius: 8px; box-shadow: 0 1px 2px rgba(0, 0, 0, 0.03); overflow: hidden; }
        .card-header {
            padding: 20px 24px; border-bottom: 1px solid #f0f0f0;
            display: flex; justify-content: space-between; align-items: center;
        }
        .card-title { font-size: 16px; font-weight: 500; color: #262626; display: flex; align-items: center; gap: 8px; }
        .card-body { padding: 24px; }
        .btn {
            padding: 8px 16px; border-radius: 6px; border: none;
            font-size: 14px; cursor: pointer; transition: all 0.3s;
        }
        .btn-primary {
            background: #1890ff; color: white;
        }
        .btn-primary:hover { background: #40a9ff; }
        .btn-default {
            background: white; color: #262626; border: 1px solid #d9d9d9;
        }
        .btn-default:hover { color: #40a9ff; border-color: #40a9ff; }
        .status-empty {
            text-align: center; padding: 60px 24px;
            color: #8c8c8c; font-size: 14px;
        }
        .status-icon { font-size: 48px; margin-bottom: 16px; }
        .info-section {
            background: #fafafa; border-radius: 6px;
            padding: 20px; margin-bottom: 24px;
        }
        .info-title {
            font-size: 14px; font-weight: 500; color: #262626;
            margin-bottom: 16px; padding-bottom: 12px;
            border-bottom: 1px solid #e8e8e8;
        }
        .info-row {
            display: flex; padding: 8px 0;
            font-size: 14px;
        }
        .info-label { color: #8c8c8c; width: 100px; flex-shrink: 0; }
        .info-value { color: #262626; flex: 1; }
        .metrics-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 16px; margin-bottom: 24px;
        }
        .metric-card {
            background: #fafafa; border-radius: 6px;
            padding: 20px; text-align: center;
        }
        .metric-value {
            font-size: 28px; font-weight: 600;
            color: #1890ff; margin-bottom: 8px;
        }
        .metric-label { font-size: 14px; color: #8c8c8c; }
        .actions {
            display: flex; gap: 12px; align-items: center;
        }
        .tip {
            background: #e6f7ff; border: 1px solid #91d5ff;
            border-radius: 6px; padding: 12px 16px;
            font-size: 14px; color: #0050b3;
            display: flex; align-items: flex-start; gap: 8px;
        }
        .progress-section { padding: 40px 24px; }
        .progress-bar-container {
            background: #f0f0f0; height: 8px;
            border-radius: 4px; overflow: hidden;
            margin: 24px 0;
        }
        .progress-bar {
            background: linear-gradient(90deg, #1890ff, #40a9ff);
            height: 100%; transition: width 0.3s;
        }
        .progress-info {
            display: flex; justify-content: space-between;
            font-size: 14px; color: #8c8c8c;
        }
        .state-selector {
            position: fixed; top: 20px; right: 20px;
            background: white; padding: 16px;
            border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 1000;
        }
        .state-selector-title {
            font-size: 12px; color: #8c8c8c;
            margin-bottom: 8px; font-weight: 500;
        }
        .state-btn {
            display: block; width: 100%;
            padding: 8px 12px; margin-bottom: 8px;
            border: 1px solid #d9d9d9; border-radius: 4px;
            background: white; cursor: pointer;
            font-size: 14px; text-align: left;
            transition: all 0.3s;
        }
        .state-btn:hover { border-color: #40a9ff; color: #40a9ff; }
        .state-btn.active { background: #1890ff; color: white; border-color: #1890ff; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="state-selector">
        <div class="state-selector-title">切换状态预览</div>
        <button class="state-btn active" onclick="showState('empty')">未生成</button>
        <button class="state-btn" onclick="showState('generating')">生成中</button>
        <button class="state-btn" onclick="showState('completed')">已生成</button>
    </div>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title">Dashboard</h1>
            <p class="page-subtitle">GEO COST MONITORING</p>
        </div>

        <!-- 状态1: 未生成 -->
        <div id="state-empty" class="report-card">
            <div class="card-header">
                <div class="card-title">
                    <span>📊</span>
                    <span>售前提案报告</span>
                </div>
                <button class="btn btn-primary" onclick="startGeneration()">生成报告</button>
            </div>
            <div class="card-body">
                <div class="status-empty">
                    <div class="status-icon">⚪</div>
                    <div>暂无报告，点击右上角「生成报告」开始</div>
                </div>
            </div>
        </div>

        <!-- 状态2: 生成中 -->
        <div id="state-generating" class="report-card hidden">
            <div class="card-header">
                <div class="card-title">
                    <span>📊</span>
                    <span>售前提案报告</span>
                </div>
                <button class="btn btn-default" disabled>生成中...</button>
            </div>
            <div class="card-body">
                <div class="progress-section">
                    <div style="text-align: center; margin-bottom: 24px;">
                        <div style="font-size: 16px; color: #262626; margin-bottom: 8px;">⏳ 正在生成报告...</div>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="progress-bar" style="width: 0%"></div>
                    </div>
                    <div class="progress-info">
                        <span id="progress-text">准备中...</span>
                        <span id="progress-percent">0%</span>
                    </div>
                    <div style="text-align: center; margin-top: 16px; font-size: 14px; color: #8c8c8c;">
                        预计剩余时间：<span id="time-remaining">约 3 分钟</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 状态3: 已生成 -->
        <div id="state-completed" class="report-card hidden">
            <div class="card-header">
                <div class="card-title">
                    <span>📊</span>
                    <span>售前提案报告</span>
                </div>
                <button class="btn btn-default" onclick="startGeneration()">重新生成</button>
            </div>
            <div class="card-body">
                <div class="info-section">
                    <div class="info-title">报告信息</div>
                    <div class="info-row">
                        <div class="info-label">品牌名称：</div>
                        <div class="info-value">双鹿电池</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">业务目标：</div>
                        <div class="info-value">提升 AI 搜索引擎中的品牌曝光和推荐率</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">覆盖平台：</div>
                        <div class="info-value">ChatGPT / Google AI / Gemini</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">生成时间：</div>
                        <div class="info-value">2026-05-21 14:32</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">报告状态：</div>
                        <div class="info-value">✅ 已生成</div>
                    </div>
                </div>

                <div class="info-section">
                    <div class="info-title">操作</div>
                    <div class="actions">
                        <button class="btn btn-primary" onclick="previewReport()">👁 预览报告</button>
                        <button class="btn btn-default" onclick="downloadReport()">⬇️ 下载 HTML</button>
                    </div>
                    <div class="tip" style="margin-top: 16px;">
                        <span>💡</span>
                        <span>提示：下载后可在本地编辑器中修改文案、替换图片、填充模板区域</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentState = 'empty';
        let progressInterval;

        function showState(state) {
            // 更新按钮状态
            document.querySelectorAll('.state-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // 隐藏所有状态
            document.getElementById('state-empty').classList.add('hidden');
            document.getElementById('state-generating').classList.add('hidden');
            document.getElementById('state-completed').classList.add('hidden');

            // 显示目标状态
            document.getElementById('state-' + state).classList.remove('hidden');
            currentState = state;

            // 如果是生成中状态，启动进度条动画
            if (state === 'generating') {
                simulateProgress();
            } else {
                clearInterval(progressInterval);
            }
        }

        function startGeneration() {
            showState('generating');
            document.querySelectorAll('.state-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.state-btn')[1].classList.add('active');
        }

        function simulateProgress() {
            let progress = 0;
            const progressBar = document.getElementById('progress-bar');
            const progressPercent = document.getElementById('progress-percent');
            const progressText = document.getElementById('progress-text');
            const timeRemaining = document.getElementById('time-remaining');

            const stages = [
                { percent: 15, text: '读取项目配置...', time: '约 3 分钟' },
                { percent: 30, text: '获取 Prompt 列表...', time: '约 2.5 分钟' },
                { percent: 45, text: '拉取爬虫数据...', time: '约 2 分钟' },
                { percent: 60, text: '计算数据指标...', time: '约 1.5 分钟' },
                { percent: 75, text: '调用 LLM 生成文案...', time: '约 1 分钟' },
                { percent: 90, text: '渲染 HTML 模板...', time: '约 30 秒' },
                { percent: 100, text: '生成完成', time: '完成' }
            ];

            let stageIndex = 0;

            progressInterval = setInterval(() => {
                if (stageIndex < stages.length) {
                    const stage = stages[stageIndex];
                    progress = stage.percent;
                    progressBar.style.width = progress + '%';
                    progressPercent.textContent = progress + '%';
                    progressText.textContent = stage.text;
                    timeRemaining.textContent = stage.time;
                    stageIndex++;
                } else {
                    clearInterval(progressInterval);
                    setTimeout(() => {
                        if (currentState === 'generating') {
                            showState('completed');
                            document.querySelectorAll('.state-btn').forEach(btn => btn.classList.remove('active'));
                            document.querySelectorAll('.state-btn')[2].classList.add('active');
                        }
                    }, 500);
                }
            }, 800);
        }

        function previewReport() {
            alert('预览功能：将在新标签页打开 HTML 报告预览');
        }

        function downloadReport() {
            alert('下载功能：将下载完整的 HTML 报告文件到本地');
        }
    </script>
</body>
</html>
